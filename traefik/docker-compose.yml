# Reference Traefik stack. In production this runs on edge nodes only.

services:
  traefik:
    image: traefik:v3.0
    command:
      - "--configFile=/etc/traefik/traefik.yml"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - traefik_letsencrypt:/letsencrypt
      - traefik_logs:/var/log/traefik
    networks:
      - hostaffin_edge
    deploy:
      placement:
        constraints:
          - node.labels.hostaffin_role == edge
      restart_policy:
        condition: on-failure
    healthcheck:
      test: ["CMD", "traefik", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  hostaffin_edge:
    driver: overlay
    attachable: true

volumes:
  traefik_letsencrypt:
  traefik_logs: