# ───────────────────────────────────────────────
# Traefik — Hostaffin sGTM Platform
# Edge reverse proxy + automatic Let's Encrypt.
# ───────────────────────────────────────────────

api:
  dashboard: true
  insecure: false

log:
  level: INFO
  format: json

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"

providers:
  docker:
    swarmMode: true
    exposedByDefault: false
    network: hostaffin_edge

certificatesResolvers:
  letsencrypt:
    acme:
      email: ops@hostaffin.com
      storage: /letsencrypt/acme.json
      httpChallenge:
        entryPoint: web

metrics:
  prometheus:
    addEntryPointsLabels: true
    addServicesLabels: true

accessLog:
  filePath: "/var/log/traefik/access.log"
  format: json
  fields:
    defaultMode: keep
    headers:
      defaultMode: drop

ping: {}