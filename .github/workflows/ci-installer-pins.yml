name: installer-pins

# Auto-bumps the SHA-256 constants inside infra/scripts/one-liner-install.sh
# whenever install-yum.sh, lib-pm.sh, or lib-ui.sh change.
#
# This keeps the wrapper's checksum verification in lockstep with the
# actual file contents on main, so the one-liner never silently drifts.

on:
  push:
    branches: [main]
    paths:
      - "infra/scripts/install-yum.sh"
      - "infra/scripts/lib-pm.sh"
      - "infra/scripts/lib-ui.sh"
      - ".github/workflows/ci-installer-pins.yml"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  bump-pins:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute current hashes
        id: hash
        run: |
          set -euo pipefail
          cd infra/scripts
          sha_install=$(sha256sum install-yum.sh | awk '{print $1}')
          sha_pm=$(sha256sum lib-pm.sh | awk '{print $1}')
          sha_ui=$(sha256sum lib-ui.sh | awk '{print $1}')
          {
            echo "install_yum=$sha_install"
            echo "lib_pm=$sha_pm"
            echo "lib_ui=$sha_ui"
          } >> "$GITHUB_OUTPUT"

      - name: Check whether pins need updating
        id: needs-update
        run: |
          set -euo pipefail
          wrap="infra/scripts/one-liner-install.sh"
          if grep -qF "${{ steps.hash.outputs.install_yum }}" "$wrap" \
             && grep -qF "${{ steps.hash.outputs.lib_pm }}" "$wrap" \
             && grep -qF "${{ steps.hash.outputs.lib_ui }}" "$wrap"; then
            echo "needs_update=false" >> "$GITHUB_OUTPUT"
            echo "All three pins already match. Nothing to do."
          else
            echo "needs_update=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Update pins in wrapper
        if: steps.needs-update.outputs.needs_update == 'true'
        run: |
          set -euo pipefail
          wrap="infra/scripts/one-liner-install.sh"
          # Use a python one-liner for safe, deterministic in-place edit.
          python3 - <<'PY'
          import os, re, pathlib
          wrap = pathlib.Path("infra/scripts/one-liner-install.sh")
          text = wrap.read_text()
          new_vals = {
              "EXPECTED_SHA_INSTALL_YUM": os.environ["INSTALL_YUM"],
              "EXPECTED_SHA_LIB_PM":      os.environ["LIB_PM"],
              "EXPECTED_SHA_LIB_UI":      os.environ["LIB_UI"],
          }
          for k, v in new_vals.items():
              pattern = re.compile(rf'^{k}="[a-f0-9]{{64}}"$', re.M)
              text, n = pattern.subn(f'{k}="{v}"', text)
              if n != 1:
                  raise SystemExit(f"Expected exactly one match for {k}, got {n}")
          wrap.write_text(text)
          PY
        env:
          INSTALL_YUM: ${{ steps.hash.outputs.install_yum }}
          LIB_PM:      ${{ steps.hash.outputs.lib_pm }}
          LIB_UI:      ${{ steps.hash.outputs.lib_ui }}

      - name: Open PR with bumped pins
        if: steps.needs-update.outputs.needs_update == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');
            const branch = `ci/installer-pin-bump-${Date.now()}`;
            execSync(`git config user.name "github-actions[bot]"`);
            execSync(`git config user.email "41898282+github-actions[bot]@users.noreply.github.com"`);
            execSync(`git checkout -b "${branch}"`);
            execSync(`git add infra/scripts/one-liner-install.sh`);
            execSync(`git commit -m "ci(installer): auto-bump SHA-256 pins for one-liner-install.sh"`);
            execSync(`git push origin "${branch}"`);
            const diff = execSync('git diff --stat HEAD~1').toString();
            await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "ci: auto-bump installer SHA-256 pins",
              head: branch,
              base: "main",
              body: "Automated bump of the SHA-256 pins in `infra/scripts/one-liner-install.sh` to match the latest `install-yum.sh`, `lib-pm.sh`, and `lib-ui.sh` on `main`.\n\n```\n" + diff + "\n```",
            });