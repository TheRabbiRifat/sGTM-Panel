---
- name: Download node-agent binary
  get_url:
    url: "{{ control_plane_url }}/dl/hostaffin-node-agent"
    dest: /usr/local/bin/hostaffin-node-agent
    mode: '0755'

- name: Create node-agent env file
  template:
    src: node-agent.env.j2
    dest: /etc/hostaffin/node-agent.env
    owner: hostaffin
    group: hostaffin
    mode: '0600'

- name: Install systemd unit
  template:
    src: hostaffin-node-agent.service.j2
    dest: /etc/systemd/system/hostaffin-node-agent.service
    mode: '0644'
  notify:
    - reload systemd
    - restart node-agent

- name: Enable and start node-agent
  service:
    name: hostaffin-node-agent
    state: started
    enabled: yes

handlers:
  - name: reload systemd
    command: systemctl daemon-reload
  - name: restart node-agent
    service:
      name: hostaffin-node-agent
      state: restarted